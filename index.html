<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>HUST MEN - Tham gia ngay</title>

<link rel="icon" href="logo.png">

<style>
/* CSS Reset and Mobile-First Principles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100dvh;
    overflow-x: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc99, #ffffff);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative; /* Context for background decor */
}

.wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 10;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 95%; /* Responsive width */
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    z-index: 20;
}

.logo {
    width: 180px;
    margin-bottom: 10px;
}

.title {
    font-size: 26px;
    font-weight: bold;
    color: #ff9800;
    margin-bottom: 10px;
}

p.instruction {
    font-size: 16px;
    color: #333;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px; /* 16px to prevent auto-zoom on iOS */
    font-family: inherit;
    color: #333;
}

textarea {
    min-height: 100px;
    resize: none;
}

select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23999' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 20px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 15px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: background 0.3s ease;
}

button:hover {
    background: #e68900;
}

.decor-item {
    position: absolute;
    z-index: 2; 
    pointer-events: none; 
}

.decor-item img {
    width: 100%;
    border-radius: 24px; 
    box-shadow: 0 20px 45px rgba(0,0,0,0.25); 
    object-fit: cover;
}

/* Common float animation */
@keyframes floatSmooth {
    0% { transform: translate3d(0, 0px, 0) rotate(0deg); }
    100% { transform: translate3d(0, -30px, 0) rotate(5deg); }
}

.float-1 { animation: floatSmooth 8s ease-in-out infinite alternate; animation-delay: 0.5s; }
.float-2 { animation: floatSmooth 9.5s ease-in-out infinite alternate; animation-delay: 1.8s; }
.float-3 { animation: floatSmooth 11s ease-in-out infinite alternate; animation-delay: 3.2s; }
.float-4 { animation: floatSmooth 7.5s ease-in-out infinite alternate; animation-delay: 1.1s; }
.float-5 { animation: floatSmooth 9s ease-in-out infinite alternate; animation-delay: 4.5s; }
.float-6 { animation: floatSmooth 8.5s ease-in-out infinite alternate; animation-delay: 2.5s; }

/* Blur levels */
.blur-sm { filter: blur(3px) opacity(0.8); }
.blur-md { filter: blur(6px) opacity(0.6); }

/* Repositioned Specific Items for Mobile/Desktop Harmony */
/* Item 3 (Products Top-Left) */
.item-3 { top: 5%; left: 5%; width: 150px; transform: rotate(-10deg); }
/* Item 4 (Products Bottom-Right) */
.item-4 { bottom: 5%; right: 5%; width: 160px; transform: rotate(15deg); }
/* Item 5 (Product Bottom-Left) */
.item-5 { bottom: 15%; left: 8%; width: 140px; transform: rotate(10deg); }
/* Item 6 (Product Top-Right) */
.item-6 { top: 10%; right: 8%; width: 130px; transform: rotate(-15deg); }

/* Ingredient Items (Blurred) */
/* Pineapple (blur-sm, float-4) */
.item-pineapple { top: 35%; left: 15%; width: 100px; transform: rotate(20deg); }
/* Rose (blur-md, float-6) */
.item-rose { top: 15%; left: 35%; width: 80px; transform: rotate(-25deg); }
/* Jasmine (blur-sm, float-2) */
.item-jasmine { bottom: 25%; right: 15%; width: 90px; transform: rotate(-10deg); }
/* Cinnamon (blur-md, float-5) */
.item-cinnamon { top: 45%; right: 12%; width: 110px; transform: rotate(30deg); }
/* Coffee Bean (blur-md, float-1) */
.item-coffee { bottom: 8%; left: 30%; width: 70px; transform: rotate(-20deg); }
/* Orange (blur-sm, float-3) */
.item-orange { top: 1%; right: 35%; width: 90px; transform: rotate(8deg); }

/* Responsive adjustments for smaller screens */
@media screen and (max-width: 600px) {
    .decor-item {
        opacity: 0.6; /* Soften decor on very small screens */
    }
    .item-3 { width: 100px; }
    .item-4 { width: 110px; }
    .item-pineapple { left: 10%; width: 80px; }
    .item-cinnamon { right: 8%; width: 90px; }
}

</style>

</head>

<body>

<div class="decor-item item-3 float-1">
<img src="3.jpg" alt="Sản phẩm 3">
</div>
<div class="decor-item item-4 float-3">
    <img src="4.jpg" alt="Sản phẩm 4">
</div>
<div class="decor-item item-5 float-5">
    <img src="5.jpg" alt="Sản phẩm 5">
</div>
<div class="decor-item item-6 float-2">
    <img src="6.jpg" alt="Sản phẩm 6">
</div>

<div class="decor-item blur-sm item-pineapple float-4">
    <img src="7.jpg" alt="Dứa">
</div>
<div class="decor-item blur-md item-rose float-6">
    <img src="8.jpg" alt="Hoa hồng">
</div>
<div class="decor-item blur-sm item-jasmine float-2">
    <img src="9.jpg" alt="Hoa nhài">
</div>
<div class="decor-item blur-md item-cinnamon float-5">
    <img src="10.jpg" alt="Quế">
</div>
<div class="decor-item blur-md item-coffee float-1">
    <img src="11.png" alt="Hạt cà phê">
</div>
<div class="decor-item blur-sm item-orange float-3">
    <img src="12.jpg" alt="Cam">
</div>


<div class="wrapper">
<div class="container">

    <!-- STEP 1 -->
<!-- STEP 1 -->
    <div id="step1">
        <img src="logo.png" class="logo">
        <div class="title">HUST MEN</div>
        <p class="instruction">Bạn muốn chọn gì?</p>

        <button onclick="goStep(2, 'gift')">QUÀ TẶNG</button>
        <br><br>
        <button onclick="goStep(2, 'buy')">MUA</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" style="display:none;">
        <p class="instruction" id="stepTitle"></p>

        <p style="font-weight:bold; margin-bottom:10px;">TÚI HÚT ẨM</p>

        <!-- 🔥 THÊM CHỌN QUẦY -->
        <select id="counter">
            <option value="">-- Chọn quầy --</option>
            <option value="A">Quầy A</option>
            <option value="B">Quầy B</option>
        </select>

        <input type="number" id="quantity" placeholder="Số lượng" min="1" value="1">

        <button onclick="submitForm()">Xác nhận</button>
    </div>

</div>
</div>

<script>
let type = "";
const ITEM_NAME = "TÚI HÚT ẨM"; // mỗi file đổi cái này

function goStep(step, selectedType = ""){
    if(selectedType) type = selectedType;

    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "none";

    document.getElementById("step" + step).style.display = "block";

    if(step === 2){
        document.getElementById("stepTitle").innerText =
            type === "gift" ? "Nhận quà" : "Mua sản phẩm";
    }
}

function resetForm(){
    document.getElementById("quantity").value = 1;
    document.getElementById("counter").value = "";
    type = "";
    goStep(1);
}

function submitForm(){

    let quantity = document.getElementById("quantity").value;
    let counter = document.getElementById("counter").value;

    if(counter === ""){
        alert("Vui lòng chọn quầy");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzpn8ZC0TaKM9GWxbbQgHR-ElVjMw2v-Bh0gEr6gqu8Aideq4BhUth5q9aS0592D3mp/exec"
        + "?type=" + type
        + "&item=" + ITEM_NAME
        + "&quantity=" + quantity
        + "&counter=" + counter,
    {
        method: "GET",
        mode: "no-cors"
    });

    setTimeout(() => {
        resetForm();
    }, 500);
}
</script>

</body>
</html>
